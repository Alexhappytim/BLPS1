spring:
  jta:
    enabled: true
    narayana:
      transaction-manager-id: ${NARAYANA_TM_ID:blps-tm}
      log-dir: ${NARAYANA_LOG_DIR:./.narayana/tx-object-store}
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/blps}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        transaction:
          coordinator_class: jta
          jta:
            platform: com.blps.app.infrastructure.transaction.NarayanaHibernateJtaPlatform
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: true
    certificate: classpath:cert.pem
    certificate-private-key: classpath:key.pem

app:
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:}
  auth:
    verification-token-ttl-hours: ${AUTH_VERIFICATION_TTL_HOURS:24}
    bootstrap-admin:
      email: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:admin@blps.local}
      password: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:admin12345}
  kafka:
    mail-topic: ${KAFKA_MAIL_TOPIC:mail.send}
  scheduling:
    inactivity-reminder-cron: ${INACTIVITY_REMINDER_CRON:0 0 3 * * *}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: debug
