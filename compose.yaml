services:
  postgres:
    image: postgres:16
    container_name: blps-postgres
    environment:
      POSTGRES_DB: blps
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blps"]
      interval: 5s
      timeout: 3s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: blps-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: blps-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blps-backend
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/blps
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_MAIL_TOPIC: ${KAFKA_MAIL_TOPIC:-mail.send}
    ports:
      - "8080:8080"
    restart: unless-stopped

  email-service:
    build:
      context: .
      dockerfile: EmailService/Dockerfile
    container_name: blps-email-service
    depends_on:
      kafka:
        condition: service_started
    environment:
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_MAIL_TOPIC: ${KAFKA_MAIL_TOPIC:-mail.send}
      KAFKA_CONSUMER_GROUP_ID: email-service
    restart: unless-stopped

volumes:
  postgres_data:
